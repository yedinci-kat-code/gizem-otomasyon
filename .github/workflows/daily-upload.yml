name: Zifiri Saatler - Otomatik Video Uretimi

on:
  schedule:
    # Turkiye saatiyle 08:00, 11:00, 14:00, 17:00, 20:00 (UTC+3 -> UTC 05:00, 08:00, 11:00, 14:00, 17:00)
    - cron: "0 5 * * *"
    - cron: "0 8 * * *"
    - cron: "0 11 * * *"
    - cron: "0 14 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  create-and-upload-video:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: FFmpeg kur
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: 1) Senaryo uret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/generate_story.py

      - name: 2) Seslendirme uret
        run: python scripts/generate_voice.py

      - name: 3) Arkaplan videolari ve muzik cek
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python scripts/fetch_background.py

      - name: 4) Videoyu render et
        run: python scripts/render_video.py

      - name: 5) YouTube'a yukle
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python scripts/upload_youtube.py

      - name: 6) Hikaye gecmisini kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history.json data/bg_history.json
          git diff --staged --quiet || git commit -m "Hikaye gecmisi guncellendi [otomatik]"
          git push

      - name: Ciktilari sakla (hata ayiklama icin)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-${{ github.run_number }}
          path: output/
          retention-days: 3
